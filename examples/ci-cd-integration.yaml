# CI/CD Integration Example
# Optimized for continuous integration pipelines

output_dir: ./ci-cache
timeout: 180s

# CI-friendly settings
install_defaults:
  scripts_policy: none  # Safer for CI - no arbitrary script execution
  allow_scripts: []

# Fast downloads for CI
downloads:
  - source: npm
    name: typescript
    version: latest
    chunks: 8          # Fast parallel download
    resume: false      # Don't resume in CI (fresh each time)

  - source: npm
    name: eslint
    version: latest
    chunks: 8

  - source: npm
    name: prettier
    version: latest
    chunks: 8

# Install dependencies
installs:
  # Build dependencies
  - source: npm
    name: webpack
    version: "^5.0.0"
    frozen_lockfile: true  # Ensure reproducible builds
    include_dev: true

  # Test dependencies
  - source: npm
    name: jest
    version: latest
    frozen_lockfile: true

