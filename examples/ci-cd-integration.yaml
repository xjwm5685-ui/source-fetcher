# CI Best Practices:
# 1. Use --continue-on-error to not fail the build on non-critical downloads
# 2. Use --retries with --retry-backoff for reliability
# 3. Use --jobs for parallel downloads (faster builds)
# 4. Use frozen_lockfile for reproducible builds
# 5. Cache the .source-fetcher directory between builds
# 6. Set appropriate timeouts
# 7. Use chunks for faster downloads
# 8. Don't use resume in CI (always fresh)
# 9. Use --plan first to verify configuration
# 10. Monitor download times and optimize

# Usage:
# sfer batch --config examples/ci-cd-integration.yaml --jobs 4 --continue-on-error --retries 2 --retry-backoff 500ms
