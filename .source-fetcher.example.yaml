# Source Fetcher 配置文件示例
# 复制此文件为 .source-fetcher.yaml 并根据需要修改

# ==================== Web GUI 配置 ====================
gui:
  port: 8765                    # Web GUI 端口
  host: 127.0.0.1               # 绑定地址 (127.0.0.1 = 仅本地访问)
  auto_open_browser: true       # 启动时自动打开浏览器
  allowed_origins:              # 允许的 CORS Origins
    - http://localhost:8765
    - http://127.0.0.1:8765

# ==================== 下载配置 ====================
download:
  output_dir: "./downloads"     # 默认下载目录
  timeout: "30s"                # 下载超时时间
  chunks: 1                     # 并发下载块数 (1-10)
  resume: true                  # 启用断点续传

# ==================== 镜像源配置 ====================
# 留空使用官方源，填写 URL 使用镜像源
mirrors:
  npm: ""                       # 例如: https://registry.npmmirror.com
  pip: ""                       # 例如: https://pypi.tuna.tsinghua.edu.cn/simple
  cargo: ""                     # 例如: https://mirrors.ustc.edu.cn/crates.io-index
  maven: ""                     # 例如: https://maven.aliyun.com/repository/public

# ==================== 日志配置 ====================
logging:
  level: "info"                 # debug | info | warn | error
  output: "stdout"              # stdout | stderr | file
  file: "./source-fetcher.log"  # 日志文件路径 (output=file 时)

# ==================== 卸载配置 ====================
uninstall:
  interactive: true             # 卸载前是否确认
  keep_manifest: false          # 卸载后是否保留清单文件

# ==================== 安全配置 ====================
security:
  https_only: false             # URL 依赖是否仅允许 HTTPS
  block_private_ips: true       # 阻止私有 IP 地址 (SSRF 防护)

# ==================== 认证配置 ====================
# 用于访问需要认证的 npm registry 或其他源
auth_profiles:
  private-registry:
    headers:
      X-Custom-Header: "value"
    bearer_token_env: "NPM_TOKEN"  # 从环境变量读取 Bearer Token
  
  # 基本认证示例
  basic-auth:
    basic_username: "username"
    basic_password_env: "REGISTRY_PASSWORD"

# ==================== npm 安装配置 ====================
install_defaults:
  scripts_policy: "root"        # none | root | all
  allow_scripts:                # 允许运行脚本的包列表
    - "package-name-1"
    - "package-name-2"
