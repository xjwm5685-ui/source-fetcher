name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build Release Binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: windows
            goarch: amd64
            output: source-fetcher-windows-amd64.exe
          - goos: windows
            goarch: arm64
            output: source-fetcher-windows-arm64.exe
          - goos: linux
            goarch: amd64
            output: source-fetcher-linux-amd64
          - goos: linux
            goarch: arm64
            output: source-fetcher-linux-arm64
          - goos: darwin
            goarch: amd64
            output: source-fetcher-darwin-amd64
          - goos: darwin
            goarch: arm64
            output: source-fetcher-darwin-arm64

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'

    - name: Build binary
      env:
        GOOS: ${{ matrix.goos }}
        GOARCH: ${{ matrix.goarch }}
        CGO_ENABLED: 0
      run: |
        go build -v -ldflags="-s -w -X main.Version=${{ github.ref_name }}" -o ${{ matrix.output }} .

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.output }}
        path: ${{ matrix.output }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: ./artifacts

    - name: Create checksums
      run: |
        cd artifacts
        for dir in */; do
          cd "$dir"
          for file in *; do
            sha256sum "$file" > "$file.sha256"
          done
          cd ..
        done

    - name: Generate release notes
      id: release_notes
      run: |
        VERSION=${{ github.ref_name }}
        echo "## What's Changed" > release_notes.md
        echo "" >> release_notes.md
        echo "See [CHANGELOG.md](CHANGELOG.md) for detailed changes." >> release_notes.md
        echo "" >> release_notes.md
        echo "## Installation" >> release_notes.md
        echo "" >> release_notes.md
        echo "### Windows" >> release_notes.md
        echo '```powershell' >> release_notes.md
        echo "# Download the appropriate binary for your architecture" >> release_notes.md
        echo "# amd64 (Intel/AMD 64-bit) or arm64 (ARM 64-bit)" >> release_notes.md
        echo '```' >> release_notes.md
        echo "" >> release_notes.md
        echo "### Linux / macOS" >> release_notes.md
        echo '```bash' >> release_notes.md
        echo "# Download the appropriate binary" >> release_notes.md
        echo "chmod +x source-fetcher-*" >> release_notes.md
        echo "sudo mv source-fetcher-* /usr/local/bin/sfer" >> release_notes.md
        echo '```' >> release_notes.md
        echo "" >> release_notes.md
        echo "## Checksums" >> release_notes.md
        echo "" >> release_notes.md
        echo "SHA256 checksums are provided for each binary." >> release_notes.md

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          artifacts/**/*
        body_path: release_notes.md
        draft: false
        prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
